<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Wiki</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/d3@7/dist/d3.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;overflow:hidden}
body{background:#030408;color:#b8e0f5;font-family:"Space Mono",monospace}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#0e1c35;border-radius:2px}
button{cursor:pointer;font-family:"Space Mono",monospace}button:hover{opacity:.8}
input,textarea{font-family:"Space Mono",monospace;color:#b8e0f5}
input:focus,textarea:focus{border-color:rgba(0,229,255,.35)!important;outline:none}
.icard:hover{border-color:rgba(0,229,255,.4)!important;box-shadow:0 0 18px rgba(0,229,255,.07)!important}
.sbrow:hover{background:rgba(0,229,255,.035)!important}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── config ────────────────────────────────────────────────────────────────────
const INGEST_SYSTEM = `You are an LLM Wiki maintainer. You maintain a personal knowledge base as structured markdown pages.

When given a source document, extract key information and integrate it into the wiki by creating or updating pages.

Return ONLY a valid JSON object (no markdown fences, no preamble) with this exact structure:
{
  "pages": [
    {
      "slug": "kebab-case-slug",
      "title": "Page Title",
      "summary": "One sentence description of this page",
      "content": "Full markdown content"
    }
  ],
  "log_entry": "Brief one-line description of what was ingested and key insights"
}

Guidelines:
- Create pages for key entities, concepts, people, technologies, ideas
- Update existing pages if a matching slug exists in current wiki
- Use [[Wikilink]] syntax inside content to link related pages (e.g. [[Machine Learning]])
- Each page: # Title, ## Section headings, **bold**, bullet lists
- Include a ## Sources section at the bottom of each page
- Slugs must be kebab-case (e.g. "machine-learning", "alan-turing")
- A single source may produce 3-8 wiki pages
- "pages" array contains both new pages AND updated existing pages`;

const QUERY_SYSTEM = `You answer questions using the provided wiki pages.
Cite sources using [[Page Title]] notation. Be concise but thorough.
If the wiki lacks relevant info, say so clearly.`;

// ── API helpers ───────────────────────────────────────────────────────────────
async function api(path, opts = {}) {
  const res = await fetch(path, {
    headers: { "Content-Type": "application/json" },
    ...opts,
    body: opts.body != null ? JSON.stringify(opts.body) : undefined,
  });
  const data = await res.json();
  if (!res.ok && res.status !== 404) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

async function callAI(system, userMsg, maxTokens = 4000) {
  const data = await api("/api/ai", {
    method: "POST",
    body: { model: "claude-sonnet-4-20250514", max_tokens: maxTokens, system, messages: [{ role: "user", content: userMsg }] },
  });
  if (data.error) throw new Error(data.error);
  return data.content?.find(b => b.type === "text")?.text || "";
}

// ── D3 graph ──────────────────────────────────────────────────────────────────
function GraphView({ pages, pageContents, onPageClick, activeSlug }) {
  const wrap = useRef(null), svgEl = useRef(null), sim = useRef(null), hov = useRef(null);
  const [tip, setTip] = useState(null);
  const [stats, setStats] = useState({ nodes: 0, links: 0, hubs: 0 });

  useEffect(() => {
    if (!svgEl.current || !wrap.current) return;
    if (sim.current) sim.current.stop();
    const svg = d3.select(svgEl.current); svg.selectAll("*").remove();
    const W = wrap.current.clientWidth || 900, H = wrap.current.clientHeight || 600;

    if (!pages.length) {
      svg.append("text").attr("x", W/2).attr("y", H/2).attr("text-anchor","middle")
        .attr("fill","#1a4060").attr("font-family",'"Space Mono",monospace').attr("font-size","13px")
        .text("No pages yet — ingest a source to build the knowledge graph");
      return;
    }

    const nm = new Map(pages.map(p => [p.slug, {...p, id:p.slug}]));
    const ls = new Set(), rl = [];
    for (const p of pages) {
      for (const m of (pageContents[p.slug]||"").matchAll(/\[\[([^\]]+)\]\]/g)) {
        const t = m[1].toLowerCase().replace(/\s+/g,"-").replace(/[^a-z0-9-]/g,"");
        if (nm.has(t) && t!==p.slug) {
          const k=[p.slug,t].sort().join("~");
          if(!ls.has(k)){ls.add(k);rl.push({source:p.slug,target:t});}
        }
      }
    }
    const cc = new Map(pages.map(p=>[p.slug,0]));
    rl.forEach(l=>{cc.set(l.source,(cc.get(l.source)||0)+1);cc.set(l.target,(cc.get(l.target)||0)+1);});
    const nodes = [...nm.values()].map(p=>({...p,connections:cc.get(p.slug)||0}));
    setStats({nodes:nodes.length,links:rl.length,hubs:nodes.filter(n=>n.connections>=3).length});

    const defs=svg.append("defs");
    const mkF=(id,d)=>{const f=defs.append("filter").attr("id",id).attr("x","-60%").attr("y","-60%").attr("width","220%").attr("height","220%");f.append("feGaussianBlur").attr("stdDeviation",d).attr("result","blur");const m=f.append("feMerge");m.append("feMergeNode").attr("in","blur");m.append("feMergeNode").attr("in","SourceGraphic");};
    mkF("gs",2.5);mkF("gm",5);mkF("gl",9);

    const g=svg.append("g");
    const zoom=d3.zoom().scaleExtent([.1,6]).on("zoom",e=>g.attr("transform",e.transform));
    svg.call(zoom);

    const R=d=>Math.max(22,22+d.connections*7);
    const sc=d=>d.id===activeSlug?"#ff0088":d.connections>=4?"#00ff88":d.connections>=1?"#00e5ff":"#003555";
    const fl=d=>d.id===activeSlug?"url(#gl)":d.connections>=2?"url(#gm)":"url(#gs)";

    const simulation=d3.forceSimulation(nodes)
      .force("link",d3.forceLink(rl).id(d=>d.id).distance(145))
      .force("charge",d3.forceManyBody().strength(-420))
      .force("center",d3.forceCenter(W/2,H/2))
      .force("collision",d3.forceCollide(d=>R(d)+22));
    sim.current=simulation;

    const lnk=g.append("g").selectAll("line").data(rl).join("line").attr("stroke","#00e5ff").attr("stroke-opacity",.15).attr("stroke-width",1.5);
    const ng=g.append("g").selectAll("g").data(nodes).join("g").style("cursor","pointer")
      .call(d3.drag()
        .on("start",(e,d)=>{if(!e.active)simulation.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y;})
        .on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y;})
        .on("end",(e,d)=>{if(!e.active)simulation.alphaTarget(0);d.fx=null;d.fy=null;}))
      .on("click",(e,d)=>{e.stopPropagation();onPageClick(d.id);})
      .on("mouseover",(e,d)=>{hov.current=d;})
      .on("mousemove",e=>{if(!hov.current||!wrap.current)return;const r=wrap.current.getBoundingClientRect();setTip({x:e.clientX-r.left+16,y:e.clientY-r.top-10,n:hov.current});})
      .on("mouseout",()=>{hov.current=null;setTip(null);});

    ng.append("circle").attr("r",d=>R(d)+9).attr("fill","none").attr("stroke",d=>sc(d)).attr("stroke-width",.5).attr("stroke-opacity",.28).attr("filter","url(#gs)");
    ng.append("circle").attr("r",d=>R(d)).attr("fill","#060810").attr("stroke",d=>sc(d)).attr("stroke-width",d=>d.id===activeSlug?2.5:1.5).attr("filter",d=>fl(d));
    ng.append("text").text(d=>{const ml=d.connections>=3?14:11;return d.title.length>ml?d.title.slice(0,ml-1)+"…":d.title;}).attr("text-anchor","middle").attr("dy","0.35em").attr("fill",d=>sc(d)).attr("font-size","9px").attr("font-family",'"Space Mono",monospace').attr("filter",d=>fl(d)).attr("pointer-events","none");

    simulation.on("tick",()=>{
      lnk.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
      ng.attr("transform",d=>`translate(${d.x},${d.y})`);
    });
    svg.on("dblclick.zoom",()=>svg.transition().duration(600).call(zoom.transform,d3.zoomIdentity.translate(W/2,H/2).scale(.85).translate(-W/2,-H/2)));
    return ()=>{ simulation.stop(); };
  }, [pages, pageContents, activeSlug]);

  return (
    <div ref={wrap} style={{position:"relative",width:"100%",height:"100%",overflow:"hidden"}}>
      <svg ref={svgEl} style={{width:"100%",height:"100%",display:"block"}}/>
      <div style={{position:"absolute",top:"1rem",left:"1rem",display:"flex",gap:".6rem"}}>
        {[["NODES",stats.nodes,"#00e5ff"],["LINKS",stats.links,"#00e5ff"],["HUBS",stats.hubs,"#00ff88"]].map(([k,v,c])=>(
          <div key={k} style={{background:"rgba(6,8,16,.88)",border:"1px solid rgba(0,229,255,.2)",borderRadius:"3px",padding:".3rem .65rem"}}>
            <span style={{fontSize:".58rem",color:"#3a7090",letterSpacing:".1em",marginRight:".4rem"}}>{k}</span>
            <span style={{fontSize:".82rem",color:c,textShadow:`0 0 8px ${c}`}}>{v}</span>
          </div>
        ))}
      </div>
      <div style={{position:"absolute",bottom:"1rem",left:"1rem",background:"rgba(6,8,16,.88)",border:"1px solid #0e1c35",borderRadius:"3px",padding:".6rem .8rem"}}>
        {[["●","#003555","isolated"],["●","#00e5ff","connected"],["●","#00ff88","hub (4+)"],["●","#ff0088","active"]].map(([s,c,l])=>(
          <div key={l} style={{display:"flex",alignItems:"center",gap:".45rem",marginBottom:".18rem"}}>
            <span style={{color:c,fontSize:".82rem",textShadow:c!=="#003555"?`0 0 5px ${c}`:"none"}}>{s}</span>
            <span style={{fontSize:".6rem",color:"#2a6080"}}>{l}</span>
          </div>
        ))}
        <div style={{fontSize:".58rem",color:"#1e4a62",marginTop:".35rem",borderTop:"1px solid #0a1228",paddingTop:".35rem"}}>drag · scroll zoom · dbl-click reset</div>
      </div>
      {tip&&(
        <div style={{position:"absolute",left:tip.x,top:tip.y,background:"rgba(6,8,20,.96)",border:"1px solid rgba(0,229,255,.4)",borderRadius:"3px",padding:".55rem .8rem",fontSize:"11px",pointerEvents:"none",zIndex:50,maxWidth:"200px",boxShadow:"0 0 16px rgba(0,229,255,.2)"}}>
          <div style={{color:"#00e5ff",marginBottom:"4px",textShadow:"0 0 6px #00e5ff"}}>{tip.n.title}</div>
          <div style={{color:"#3a7898",marginBottom:"4px",lineHeight:1.4,fontSize:"10px"}}>{tip.n.summary}</div>
          <div style={{color:"#2a5878",fontSize:"10px"}}><code style={{color:"#2a5a78",fontSize:"9px"}}>@wiki/{tip.n.slug}.md</code> · {tip.n.connections} link{tip.n.connections!==1?"s":""}</div>
        </div>
      )}
    </div>
  );
}

// ── markdown renderer ─────────────────────────────────────────────────────────
function md(text, onLink) {
  if (!text) return null;
  const lines=text.split("\n"),out=[];let key=0,i=0;
  while(i<lines.length){
    const l=lines[i];
    if(l.startsWith("# "))      out.push(<h1 key={key++} style={{fontFamily:'"Orbitron",monospace',fontSize:"1.5rem",fontWeight:700,color:"#b8e0f5",marginBottom:".3rem",textShadow:"0 0 18px rgba(0,229,255,.15)",lineHeight:1.3}}>{ri(l.slice(2),onLink)}</h1>);
    else if(l.startsWith("## "))out.push(<h2 key={key++} style={{fontFamily:'"Space Mono",monospace',fontSize:".88rem",fontWeight:700,color:"#00e5ff",marginTop:"1.5rem",marginBottom:".4rem",letterSpacing:".1em",textShadow:"0 0 8px rgba(0,229,255,.35)"}}>{ri(l.slice(3),onLink)}</h2>);
    else if(l.startsWith("### "))out.push(<h3 key={key++} style={{fontFamily:'"Space Mono",monospace',fontSize:".8rem",fontWeight:700,color:"#2a8aaa",marginTop:"1rem",marginBottom:".3rem"}}>{ri(l.slice(4),onLink)}</h3>);
    else if(l.startsWith("- ")||l.startsWith("* ")){
      const items=[];
      while(i<lines.length&&(lines[i].startsWith("- ")||lines[i].startsWith("* "))){items.push(<li key={i} style={{marginBottom:".28rem"}}>{ri(lines[i].slice(2),onLink)}</li>);i++;}
      out.push(<ul key={key++} style={{paddingLeft:"1.5rem",margin:".5rem 0",color:"#4a9ab8"}}>{items}</ul>);continue;
    }
    else if(l.startsWith("---"))out.push(<hr key={key++} style={{border:"none",borderTop:"1px solid #0e1c35",margin:"1.25rem 0"}}/>);
    else if(l.trim()==="")out.push(<div key={key++} style={{height:".6rem"}}/>);
    else out.push(<p key={key++} style={{margin:".3rem 0",lineHeight:1.9,color:"#5aaac8"}}>{ri(l,onLink)}</p>);
    i++;
  }
  return out;
}

function ri(text,onLink){
  const parts=[];let rem=text,k=0;
  while(rem.length>0){
    const wm=rem.match(/\[\[([^\]]+)\]\]/),bm=rem.match(/\*\*([^*]+)\*\*/),im=rem.match(/(?<!\*)\*([^*]+)\*(?!\*)/);
    let best=null,bi=Infinity;
    if(wm&&wm.index<bi){best="w";bi=wm.index;}if(bm&&bm.index<bi){best="b";bi=bm.index;}if(im&&im.index<bi){best="i";bi=im.index;}
    if(!best){parts.push(rem);break;}
    if(bi>0)parts.push(rem.slice(0,bi));
    if(best==="w"){const lt=wm[1],sl=lt.toLowerCase().replace(/\s+/g,"-").replace(/[^a-z0-9-]/g,"");parts.push(<span key={k++} onClick={()=>onLink&&onLink(sl,lt)} style={{color:"#00e5ff",cursor:"pointer",textDecoration:"underline",textDecorationStyle:"dotted",textDecorationColor:"#004060",textShadow:"0 0 5px rgba(0,229,255,.35)"}}>{lt}</span>);rem=rem.slice(bi+wm[0].length);}
    else if(best==="b"){parts.push(<strong key={k++} style={{color:"#90d8f0"}}>{bm[1]}</strong>);rem=rem.slice(bi+bm[0].length);}
    else{parts.push(<em key={k++}>{im[1]}</em>);rem=rem.slice(bi+im[0].length);}
  }
  return parts.length===1&&typeof parts[0]==="string"?parts[0]:parts;
}

// ── main app ──────────────────────────────────────────────────────────────────
function App() {
  const [pages,setPages]             = useState([]);
  const [pageContents,setPC]         = useState({});
  const [log,setLog]                 = useState([]);
  const [view,setView]               = useState("home");
  const [slug,setSlug]               = useState(null);
  const [srcText,setSrcText]         = useState("");
  const [srcTitle,setSrcTitle]       = useState("");
  const [qText,setQText]             = useState("");
  const [qResult,setQResult]         = useState("");
  const [loading,setLoading]         = useState(false);
  const [loadMsg,setLoadMsg]         = useState("");
  const [err,setErr]                 = useState("");
  const [toast,setToast]             = useState("");
  const [confirmReset,setConfReset]  = useState(false);
  const [ready,setReady]             = useState(false);
  const [stats,setStats]             = useState(null);

  useEffect(()=>{ load(); },[]);

  const toast_ = msg => { setToast(msg); setTimeout(()=>setToast(""),3000); };
  const err_   = msg => { setErr(msg);   setTimeout(()=>setErr(""),5000); };

  async function load() {
    try {
      const ps = await api("/api/pages");
      setPages(ps);
      const c={};
      for(const p of ps){try{const d=await api(`/api/pages/${p.slug}`);c[p.slug]=d.content||"";}catch{}}
      setPC(c);
      setLog(await api("/api/log"));
      const s=await api("/api/stats"); setStats(s);
    } catch(e){ err_("Cannot reach server. Is server.py running? "+e.message); }
    setReady(true);
  }

  async function ingest() {
    if(!srcText.trim())return;
    setLoading(true); setErr(""); setLoadMsg("Reading source…");
    try {
      const ctx=pages.map(p=>`slug:"${p.slug}" title:"${p.title}" — ${p.summary}`).join("\n");
      const userMsg=`Current wiki:\n${ctx||"(empty)"}\n\nSource${srcTitle?` — "${srcTitle}"`:""}:\n---\n${srcText.trim()}\n---`;
      setLoadMsg("Synthesizing with claude -p…");
      const raw=await callAI(INGEST_SYSTEM,userMsg,4000);
      const result=JSON.parse(raw.replace(/^```json\s*/m,"").replace(/```\s*$/m,"").trim());

      setLoadMsg("Writing .md files…");
      const saved=await api("/api/pages",{method:"POST",body:{
        pages:result.pages||[],
        source_text:srcText,
        source_title:srcTitle,
      }});

      const logEntry={date:new Date().toISOString(),type:"ingest",entry:result.log_entry||`Ingested: ${srcTitle||"source"}`};
      await api("/api/log",{method:"POST",body:logEntry});
      setLog(l=>[...l,logEntry]);

      const updP=[...pages],updC={...pageContents};
      for(const p of result.pages||[]){
        updC[p.slug]=p.content;
        const idx=updP.findIndex(x=>x.slug===p.slug);
        const e={slug:p.slug,title:p.title,summary:p.summary||"",date:new Date().toISOString().split("T")[0]};
        if(idx>=0)updP[idx]=e;else updP.push(e);
      }
      setPages(updP);setPC(updC);
      setSrcText("");setSrcTitle("");
      const s=await api("/api/stats");setStats(s);
      toast_(`⬡ ${result.pages?.length||0} pages written to wiki/`);
      setView("home");
    } catch(e){ err_("Ingest failed: "+e.message); }
    setLoading(false);setLoadMsg("");
  }

  async function query() {
    if(!qText.trim())return;
    setLoading(true);setErr("");setQResult("");setLoadMsg("Scanning knowledge graph…");
    try {
      let ctx;
      if(!pages.length) ctx="(Wiki is empty.)";
      else if(pages.length<=12) ctx=pages.map(p=>`## [[${p.title}]]\n${pageContents[p.slug]||"(no content)"}`).join("\n\n---\n\n");
      else ctx="Wiki Index:\n"+pages.map(p=>`- [[${p.title}]] (${p.slug}): ${p.summary}`).join("\n");
      const answer=await callAI(QUERY_SYSTEM,`Wiki:\n${ctx}\n\nQuestion: ${qText}`,2000);
      setQResult(answer);
      const logEntry={date:new Date().toISOString(),type:"query",entry:qText};
      await api("/api/log",{method:"POST",body:logEntry});
      setLog(l=>[...l,logEntry]);
    } catch(e){ err_("Query failed: "+e.message); }
    setLoading(false);setLoadMsg("");
  }

  async function resetWiki() {
    if(!confirmReset){setConfReset(true);setTimeout(()=>setConfReset(false),4000);return;}
    try {
      await api("/api/reset",{method:"POST"});
      setPages([]);setPC({});setLog([]);setSlug(null);setView("home");setConfReset(false);setStats(null);
      toast_("⬡ Wiki cleared");
    } catch(e){ err_("Reset failed: "+e.message); }
  }

  function openPage(s, fallback) {
    let p=pages.find(x=>x.slug===s);
    if(!p&&fallback)p=pages.find(x=>x.title.toLowerCase()===fallback.toLowerCase());
    if(p){setSlug(p.slug);setView("page");}
    else{err_(`[[${fallback||s}]] doesn't exist yet.`);}
  }

  const curPage=pages.find(p=>p.slug===slug);
  const isGraph=view==="graph";
  const N={bg:"#030408",surface:"#060810",border:"#0e1c35",cyan:"#00e5ff",green:"#00ff88",magenta:"#ff0088",text:"#4a9ab8",textBright:"#b8e0f5",textDim:"#2a6080",mono:'"Space Mono",monospace',display:'"Orbitron",monospace'};

  const navBtn=(active,col)=>({background:active?"rgba(0,229,255,.07)":"transparent",border:active?`1px solid rgba(0,229,255,.3)`:`1px solid ${N.border}`,color:active?(col||N.cyan):N.text,padding:".28rem .8rem",borderRadius:"3px",fontSize:".72rem",fontFamily:N.mono,letterSpacing:".08em",transition:"all .15s",textShadow:active?`0 0 7px ${col||N.cyan}`:"none"});

  if(!ready)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:N.bg}}><div style={{fontFamily:N.mono,color:N.textDim,fontSize:".75rem",letterSpacing:".15em"}}>CONNECTING TO SERVER…</div></div>;

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100vh",background:N.bg,color:N.textBright,fontFamily:N.mono,overflow:"hidden"}}>

      {loading&&<div style={{position:"fixed",inset:0,background:"rgba(3,4,8,.9)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",zIndex:200,backdropFilter:"blur(6px)"}}>
        <div style={{width:"26px",height:"26px",border:"1px solid #0a2040",borderTop:`1px solid ${N.cyan}`,borderRadius:"50%",animation:"spin .55s linear infinite",marginBottom:".9rem",boxShadow:"0 0 14px rgba(0,229,255,.4)"}}/>
        <div style={{color:N.cyan,fontSize:".75rem",letterSpacing:".18em",textShadow:`0 0 10px ${N.cyan}`,animation:"pulse 1.6s ease-in-out infinite"}}>{loadMsg}</div>
      </div>}

      {toast&&<div style={{position:"fixed",bottom:"1.5rem",right:"1.5rem",background:N.surface,border:"1px solid rgba(0,255,136,.35)",color:N.green,padding:".55rem .95rem",fontSize:".72rem",borderRadius:"3px",zIndex:300,boxShadow:"0 0 14px rgba(0,255,136,.12)",letterSpacing:".06em"}}>{toast}</div>}

      {/* Header */}
      <header style={{display:"flex",alignItems:"center",padding:"0 1.5rem",height:"46px",borderBottom:`1px solid ${N.border}`,background:N.surface,flexShrink:0,gap:".45rem",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",inset:0,backgroundImage:"repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,229,255,.012) 3px,rgba(0,229,255,.012) 4px)",pointerEvents:"none"}}/>
        <div onClick={()=>setView("home")} style={{fontFamily:N.display,fontSize:".82rem",fontWeight:700,color:N.cyan,letterSpacing:".22em",marginRight:"auto",textShadow:`0 0 14px ${N.cyan},0 0 28px rgba(0,229,255,.25)`,cursor:"pointer",userSelect:"none"}}>◈ LLM WIKI</div>
        <button style={navBtn(isGraph,N.green)} onClick={()=>setView("graph")}>◈ graph</button>
        <button style={navBtn(view==="ingest")} onClick={()=>setView("ingest")}>+ ingest</button>
        <button style={navBtn(view==="query")} onClick={()=>setView("query")}>? query</button>
        <button style={navBtn(view==="log")} onClick={()=>setView("log")}>≡ log</button>
        <div style={{width:"1px",height:"18px",background:N.border,margin:"0 .2rem"}}/>
        <button onClick={resetWiki} style={{background:confirmReset?"rgba(255,0,136,.12)":"transparent",border:`1px solid ${confirmReset?"rgba(255,0,136,.5)":N.border}`,color:confirmReset?N.magenta:"#3a5570",padding:".28rem .7rem",borderRadius:"3px",fontSize:".72rem",fontFamily:N.mono,letterSpacing:".06em",transition:"all .15s",textShadow:confirmReset?`0 0 8px ${N.magenta}`:"none"}}>
          {confirmReset?"confirm?":"⊘ reset"}
        </button>
      </header>

      <div style={{display:"flex",flex:1,overflow:"hidden"}}>
        {/* Sidebar */}
        {!isGraph&&<aside style={{width:"195px",borderRight:`1px solid ${N.border}`,display:"flex",flexDirection:"column",overflow:"hidden",flexShrink:0,background:N.surface}}>
          <div style={{padding:".6rem 1rem .45rem",fontSize:".58rem",color:N.textDim,letterSpacing:".18em",textTransform:"uppercase",borderBottom:`1px solid ${N.border}`}}>pages ({pages.length})</div>
          <div style={{flex:1,overflowY:"auto"}}>
            {!pages.length
              ?<div style={{padding:"1rem",color:N.textDim,fontSize:".72rem",lineHeight:1.9}}>no pages yet.<br/>ingest a source.</div>
              :pages.map(p=>{const a=slug===p.slug&&view==="page";return(
                <div key={p.slug} className="sbrow" style={{padding:".52rem 1rem .48rem",cursor:"pointer",background:a?"rgba(0,229,255,.06)":"transparent",borderLeft:a?`2px solid ${N.cyan}`:"2px solid transparent",transition:"all .1s"}} onClick={()=>openPage(p.slug)}>
                  <div style={{fontSize:".78rem",color:a?N.cyan:N.textBright,lineHeight:1.3,textShadow:a?`0 0 6px ${N.cyan}`:"none"}}>{p.title}</div>
                  <div style={{fontSize:".62rem",color:N.textDim,marginTop:"2px"}}>{p.date}</div>
                </div>
              );})}
          </div>
          {stats&&<div style={{padding:".5rem .85rem",borderTop:`1px solid ${N.border}`,fontSize:".6rem",color:N.textDim,lineHeight:1.9}}>
            <div><span style={{color:"#1e4a62"}}>wiki/</span> {stats.wiki_files} files</div>
            <div><span style={{color:"#1e4a62"}}>sources/</span> {stats.source_files} files</div>
          </div>}
        </aside>}

        {/* Main */}
        <main style={{flex:1,overflow:isGraph?"hidden":"auto",padding:isGraph?0:"2rem 2.5rem 3rem",background:N.bg,backgroundImage:!isGraph?"linear-gradient(rgba(0,229,255,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.022) 1px,transparent 1px)":"none",backgroundSize:!isGraph?"48px 48px":"auto",position:"relative"}}>

          {err&&!isGraph&&<div style={{background:"#0e0510",border:"1px solid rgba(255,0,136,.4)",color:"#e060a0",padding:".5rem .85rem",fontSize:".73rem",borderRadius:"3px",marginBottom:"1rem",whiteSpace:"pre-wrap"}}>{err}</div>}

          {isGraph&&<GraphView pages={pages} pageContents={pageContents} onPageClick={s=>openPage(s)} activeSlug={slug}/>}

          {view==="home"&&!pages.length&&<div style={{maxWidth:"520px"}}>
            <div style={{fontFamily:N.display,fontSize:"1.3rem",fontWeight:700,color:N.textBright,marginBottom:"1rem",textShadow:"0 0 18px rgba(0,229,255,.12)",lineHeight:1.35}}>Personal Knowledge Wiki</div>
            <p style={{color:N.text,lineHeight:2,fontSize:".85rem",marginBottom:"1.5rem"}}>Pages are stored as <code style={{color:N.cyan,fontSize:".8rem"}}>wiki/*.md</code> files on disk. Reference them directly in Claude Code with <code style={{color:N.green,fontSize:".8rem"}}>@wiki/page.md</code>. AI runs through <code style={{color:N.cyan,fontSize:".8rem"}}>claude -p</code> — no API key needed.</p>
            <div style={{border:`1px solid ${N.border}`,borderRadius:"4px",padding:".9rem 1.1rem",marginBottom:"1.5rem",background:N.surface,fontSize:".78rem"}}>
              <div style={{color:N.textDim,marginBottom:".6rem",fontSize:".65rem",letterSpacing:".1em"}}>CLAUDE CODE USAGE</div>
              {[
                ['claude "@wiki/index.md what topics are covered?"'],
                ['claude -p "@wiki/ml.md @wiki/dl.md compare"'],
                ['claude "@sources/paper.md summarize key findings"'],
              ].map(([ cmd ],i)=><div key={i} style={{fontFamily:N.mono,fontSize:".72rem",color:N.green,marginBottom:".35rem",textShadow:"0 0 5px rgba(0,255,136,.2)"}}>{cmd}</div>)}
            </div>
            <button onClick={()=>setView("ingest")} style={{background:"transparent",border:`1px solid ${N.cyan}`,color:N.cyan,padding:".5rem 1.2rem",fontSize:".78rem",borderRadius:"3px",letterSpacing:".08em",boxShadow:"0 0 12px rgba(0,229,255,.13)",textShadow:`0 0 7px ${N.cyan}`}}>+ Ingest First Source</button>
          </div>}

          {view==="home"&&pages.length>0&&<div>
            <div style={{fontSize:".6rem",color:N.textDim,letterSpacing:".18em",textTransform:"uppercase",marginBottom:"1rem"}}>index — {pages.length} pages</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(215px,1fr))",gap:".75rem"}}>
              {pages.map(p=>(
                <div key={p.slug} className="icard" onClick={()=>openPage(p.slug)} style={{border:`1px solid ${N.border}`,borderRadius:"4px",padding:".9rem 1.1rem",cursor:"pointer",transition:"all .15s",background:N.surface}}>
                  <div style={{fontSize:".85rem",marginBottom:".35rem",color:N.textBright,lineHeight:1.3}}>{p.title}</div>
                  <div style={{fontSize:".72rem",color:N.text,lineHeight:1.5,marginBottom:".4rem"}}>{p.summary}</div>
                  <div style={{fontSize:".6rem",color:"#1e4a62",fontFamily:N.mono}}>@wiki/{p.slug}.md</div>
                </div>
              ))}
            </div>
          </div>}

          {view==="page"&&curPage&&<div style={{maxWidth:"680px"}}>
            <div style={{fontSize:".65rem",color:N.textDim,marginBottom:"1.2rem",display:"flex",alignItems:"center",gap:".75rem"}}>
              <span style={{color:N.text,cursor:"pointer"}} onClick={()=>setView("home")}>index</span>
              <span>/</span>
              <code style={{color:"#1e5070",fontSize:".65rem"}}>wiki/{curPage.slug}.md</code>
              <span style={{color:N.textDim,cursor:"pointer",marginLeft:"auto"}} onClick={()=>{setSlug(curPage.slug);setView("graph");}}>◈ graph →</span>
            </div>
            <div style={{fontFamily:N.display,fontSize:"1.5rem",fontWeight:700,color:N.textBright,marginBottom:".25rem",textShadow:"0 0 18px rgba(0,229,255,.12)",lineHeight:1.3}}>{curPage.title}</div>
            <div style={{fontSize:".65rem",color:N.textDim,marginBottom:"1.75rem"}}>{curPage.date} · {curPage.summary}</div>
            <div style={{borderTop:`1px solid ${N.border}`,paddingTop:"1.5rem"}}>{md(pageContents[slug],(s,t)=>openPage(s,t))}</div>
          </div>}

          {view==="ingest"&&<div style={{maxWidth:"630px"}}>
            <div style={{fontFamily:N.display,fontSize:"1rem",fontWeight:700,color:N.textBright,marginBottom:"1.5rem",textShadow:"0 0 14px rgba(0,229,255,.12)"}}>Ingest Source</div>
            <div style={{marginBottom:".85rem"}}>
              <div style={{fontSize:".58rem",color:N.textDim,letterSpacing:".15em",textTransform:"uppercase",marginBottom:".4rem"}}>Title (optional)</div>
              <input style={{width:"100%",background:N.surface,border:`1px solid ${N.border}`,color:N.textBright,padding:".58rem .9rem",fontSize:".82rem",borderRadius:"3px"}} placeholder="Article name, topic…" value={srcTitle} onChange={e=>setSrcTitle(e.target.value)}/>
            </div>
            <div style={{marginBottom:"1.1rem"}}>
              <div style={{fontSize:".58rem",color:N.textDim,letterSpacing:".15em",textTransform:"uppercase",marginBottom:".4rem"}}>Source text</div>
              <textarea style={{width:"100%",background:N.surface,border:`1px solid ${N.border}`,color:N.textBright,padding:".85rem",fontSize:".8rem",resize:"vertical",borderRadius:"3px",lineHeight:1.75,minHeight:"175px"}} placeholder={"Paste any text — article, paper, notes…\n\nClaude will extract entities, write wiki/*.md files, and save the source to sources/"} value={srcText} onChange={e=>setSrcText(e.target.value)}/>
            </div>
            <div style={{display:"flex",gap:".65rem"}}>
              <button onClick={ingest} disabled={!srcText.trim()||loading} style={{background:"transparent",border:`1px solid ${N.cyan}`,color:N.cyan,padding:".48rem 1.15rem",fontSize:".78rem",borderRadius:"3px",letterSpacing:".08em",boxShadow:"0 0 10px rgba(0,229,255,.1)",textShadow:`0 0 6px ${N.cyan}`}}>Synthesize into Wiki</button>
              <button onClick={()=>{setSrcText("");setView("home");}} style={{background:"transparent",border:`1px solid ${N.border}`,color:N.text,padding:".48rem .95rem",fontSize:".78rem",borderRadius:"3px"}}>Cancel</button>
            </div>
          </div>}

          {view==="query"&&<div style={{maxWidth:"680px"}}>
            <div style={{fontFamily:N.display,fontSize:"1rem",fontWeight:700,color:N.textBright,marginBottom:"1.5rem",textShadow:"0 0 14px rgba(0,229,255,.12)"}}>Query Wiki</div>
            <div style={{display:"flex",gap:".65rem",marginBottom:".4rem"}}>
              <input style={{flex:1,background:N.surface,border:`1px solid ${N.border}`,color:N.textBright,padding:".58rem .9rem",fontSize:".82rem",borderRadius:"3px"}} placeholder="Ask anything about your knowledge base…" value={qText} onChange={e=>setQText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&query()}/>
              <button onClick={query} disabled={!qText.trim()||loading} style={{background:"transparent",border:`1px solid ${N.cyan}`,color:N.cyan,padding:".48rem 1.05rem",fontSize:".78rem",borderRadius:"3px",flexShrink:0,textShadow:`0 0 6px ${N.cyan}`,boxShadow:"0 0 10px rgba(0,229,255,.1)"}}>Ask</button>
            </div>
            {!pages.length&&<div style={{color:N.textDim,fontSize:".72rem",marginTop:".35rem"}}>wiki is empty — ingest sources first.</div>}
            {qResult&&<div style={{marginTop:"1.75rem",borderTop:`1px solid ${N.border}`,paddingTop:"1.5rem"}}>
              <div style={{fontSize:".58rem",color:N.textDim,letterSpacing:".15em",textTransform:"uppercase",marginBottom:"1rem"}}>Answer</div>
              {md(qResult,(s,t)=>openPage(s,t))}
              <div style={{marginTop:"1.25rem"}}>
                <button onClick={()=>{setSrcText(`# Query: ${qText}\n\n${qResult}`);setSrcTitle(`Q: ${qText.slice(0,60)}`);setView("ingest");}} style={{background:"transparent",border:`1px solid ${N.border}`,color:N.text,padding:".38rem .85rem",fontSize:".7rem",borderRadius:"3px"}}>→ file as wiki page</button>
              </div>
            </div>}
          </div>}

          {view==="log"&&<div style={{maxWidth:"650px"}}>
            <div style={{fontFamily:N.display,fontSize:"1rem",fontWeight:700,color:N.textBright,marginBottom:"1.5rem",textShadow:"0 0 14px rgba(0,229,255,.12)"}}>Activity Log</div>
            {!log.length
              ?<div style={{color:N.textDim,fontSize:".78rem"}}>no activity yet.</div>
              :[...log].reverse().map((e,i)=>(
                <div key={i} style={{borderBottom:`1px solid ${N.border}`,padding:".62rem 0",display:"flex",gap:"1rem",alignItems:"flex-start"}}>
                  <div style={{fontSize:".62rem",color:N.textDim,flexShrink:0,paddingTop:"3px",minWidth:"128px"}}>{e.date.replace("T"," ").slice(0,16)}</div>
                  <div style={{fontSize:".65rem",color:e.type==="ingest"?N.cyan:N.text,flexShrink:0,paddingTop:"3px",minWidth:"46px",textShadow:e.type==="ingest"?`0 0 5px ${N.cyan}`:"none"}}>{e.type}</div>
                  <div style={{fontSize:".8rem",color:N.text,lineHeight:1.55}}>{e.entry}</div>
                </div>
              ))}
          </div>}

        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
